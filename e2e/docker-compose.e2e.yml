#
# Self-contained e2e compose file.
#
# Rationale: the base docker-compose.yml is intended for local `dapr run` dev
# workflows and currently can't boot cleanly against Dapr 1.17.3 (the scheduler
# command uses a removed --replica-count flag). The e2e tests here exercise
# HTTP endpoints, Postgres round-trips, and cross-service fan-out via direct
# HttpClient — none of which require the Dapr sidecar — so this file declares
# the full e2e stack without Dapr.
#
# Note: mcr.microsoft.com/dotnet/aspnet:10.0 is chiseled (no shell/wget/curl),
# so per-container healthchecks for the .NET services aren't feasible.
# e2e-test.sh polls readiness from the host instead.
#
# Usage (via Makefile):
#     make e2e
# Which expands to:
#     docker compose -f e2e/docker-compose.e2e.yml up -d --wait --build
#

services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: product
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: product
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: test
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "1000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: order
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: test
      PRODUCT_SERVICE_BASE_URL: http://product-service:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "1001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started
