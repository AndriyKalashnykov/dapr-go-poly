# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# Self-contained e2e compose file.
#
# Rationale: isolates the e2e stack from the base docker-compose.yml so
# developer-side compose state (stale volumes, host port collisions) can't
# contaminate the CI run. Duplicates placement + scheduler + postgres +
# rabbitmq from the base file; accepted cost for the isolation.
#
# Note: mcr.microsoft.com/dotnet/aspnet:10.0 is chiseled (no shell/wget/curl),
# so per-container healthchecks for the .NET services aren't feasible.
# e2e-test.sh polls readiness from the host instead.
#
# Every operator-tunable value is `${VAR:-default}`-formed and documented in
# `.env.example`. Third-party image container ports (postgres 5432, rabbitmq
# 5672/15672, redis 6379) stay literal on the container side — only the host
# mapping is tunable. Our services externalize both sides.
#
# Usage (via Makefile):
#     make e2e
# Which expands to:
#     docker compose -f e2e/docker-compose.e2e.yml up -d --wait --build
#

services:

  # ------------------------------------------------------------------
  # Dapr control plane (placement + scheduler)
  # ------------------------------------------------------------------
  # onboarding's Dapr durable workflows need both. Scheduler uses tmpfs
  # because the image runs nonroot (UID 65532) and host bind mounts / default
  # named volumes are root-owned — tmpfs sidesteps the perms problem.

  placement:
    image: "daprio/dapr:1.17.4@sha256:8e4da92d1e15a7aca7ecf416947d14d5a5db83ae502283219724d9608ff0e7d1"
    command: ["./placement", "--port", "${DAPR_PLACEMENT_PORT:-50006}"]

  scheduler:
    image: "daprio/dapr:1.17.4@sha256:8e4da92d1e15a7aca7ecf416947d14d5a5db83ae502283219724d9608ff0e7d1"
    # Dapr 1.17.3 flag inventory: --replica-count removed; --etcd-client-ports
    # renamed to --etcd-client-port (single uint); --etcd-client-http-ports
    # removed; --initial-cluster renamed to --etcd-initial-cluster.
    command:
      - "./scheduler"
      - "--port"
      - "${DAPR_SCHEDULER_PORT:-50007}"
      - "--id"
      - "scheduler-0"
      - "--etcd-data-dir"
      - "/var/run/dapr/scheduler"
      - "--etcd-initial-cluster"
      - "scheduler-0=http://scheduler-0:2380"
    tmpfs:
      - /var/run/dapr/scheduler
    depends_on:
      placement:
        condition: service_started

  # ------------------------------------------------------------------
  # Backing services
  # ------------------------------------------------------------------

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      POSTGRES_DB: "${POSTGRES_DB:-product}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    # Actor state store for Dapr Workflow. Dapr workflows require a state
    # store with actorStateStore=true; see e2e/dapr/components/statestore.yaml.
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15672}:15672"
    # `ping` returns healthy before RabbitMQ finishes its routing boot step;
    # `check_running` waits for the full startup. Prevents a race where
    # order-service's OrdersConsumer connects during boot and hits "None of
    # the specified endpoints were reachable". Observed intermittently on
    # slower CI runners. See RabbitMQ docs:
    # https://www.rabbitmq.com/docs/monitoring#health-checks
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

  # ------------------------------------------------------------------
  # Application services + Dapr sidecars
  # ------------------------------------------------------------------

  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DATABASE: "${PRODUCT_DATABASE:-product}"
      POSTGRES_USERNAME: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      ASPNETCORE_URLS: "http://+:${APP_INTERNAL_PORT:-8080}"
    ports:
      - "${PRODUCT_HOST_PORT:-1000}:${APP_INTERNAL_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DATABASE: "${ORDER_DATABASE:-order}"
      POSTGRES_USERNAME: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      PRODUCT_SERVICE_BASE_URL: "${PRODUCT_SERVICE_BASE_URL:-http://product-service:8080}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      ASPNETCORE_URLS: "http://+:${APP_INTERNAL_PORT:-8080}"
    ports:
      - "${ORDER_HOST_PORT:-1001}:${APP_INTERNAL_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started

  onboarding:
    build:
      context: ../onboarding
      dockerfile: Dockerfile
    environment:
      # Bind port for the Go HTTP server (read via APP_PORT). Kept in sync with
      # the daprd -app-port below and the container side of the port mapping.
      APP_PORT: "${APP_INTERNAL_PORT:-8080}"
      # The onboarding process connects to its sidecar on the default gRPC
      # port. network_mode: service:onboarding-dapr on the sidecar puts them
      # on the same loopback, so DAPR_GRPC_PORT defaults to 50001.
      DAPR_GRPC_PORT: "${DAPR_GRPC_PORT:-50001}"
    ports:
      - "${ONBOARDING_HOST_PORT:-1002}:${APP_INTERNAL_PORT:-8080}"
    depends_on:
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy

  onboarding-dapr:
    image: "daprio/daprd:1.17.4"
    # Dapr Workflow requires an actor-capable state store; we mount a minimal
    # Redis-backed component definition. Without -resources-path, daprd runs
    # with zero components and ScheduleWorkflow fails with "the state store is
    # not configured to use the actor runtime."
    command:
      - "./daprd"
      - "-app-id"
      - "onboarding"
      - "-app-port"
      - "${APP_INTERNAL_PORT:-8080}"
      - "-dapr-grpc-port"
      - "${DAPR_GRPC_PORT:-50001}"
      - "-placement-host-address"
      - "placement:${DAPR_PLACEMENT_PORT:-50006}"
      - "-scheduler-host-address"
      - "scheduler:${DAPR_SCHEDULER_PORT:-50007}"
      - "-resources-path"
      - "/dapr/components"
      - "-log-level"
      - "info"
    volumes:
      - ../e2e/dapr/components:/dapr/components:ro
    depends_on:
      onboarding:
        condition: service_started
      redis:
        condition: service_healthy
    network_mode: "service:onboarding"
