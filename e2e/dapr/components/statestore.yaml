apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    # Required for Dapr Workflow — the durable task engine stores workflow
    # instance state in this actor-capable state store.
    - name: actorStateStore
      value: "true"
