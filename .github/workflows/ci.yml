name: CI

on:
  # No trigger-level paths-ignore — doc-only skipping is handled by the
  # `changes` detector job below (dorny/paths-filter) + per-job `if:` gates.
  # Trigger-level path filters deadlock with Repository Rulesets and silently
  # mishandle the `!CLAUDE.md` re-include; the changes-detector pattern is the
  # portfolio standard and is Rulesets-safe.
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:
  workflow_dispatch:   # manual re-trigger; also resurrects the workflow if a
                       # run-cleanup ever leaves it in GitHub state=deleted

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter's listFiles() on pull_request events

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # On tag pushes the tag SHA usually equals main's tip, so the path
      # filter sees an empty diff and returns code=false — which would skip
      # the whole release pipeline. Force code=true on tags (§15g single-touch).
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          # On push events act needs an explicit base (its synthetic event omits
          # repository.default_branch); on pull_request the action uses the PR
          # base and IGNORES this input, so gate it to push only.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
              - 'docs/diagrams/**/*.puml'

  static-check:
    needs: [changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise installs Go (1.26.4, from .mise.toml) AND the CLI toolchain the
      # `make` targets call (golangci-lint, hadolint, trivy, gitleaks,
      # actionlint, shellcheck, govulncheck). Single source of truth.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      # Go module + build cache (mise-action caches tool installs, not modules).
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise installs Go (1.26.4, from .mise.toml) AND the CLI toolchain the
      # `make` targets call (golangci-lint, hadolint, trivy, gitleaks,
      # actionlint, shellcheck, govulncheck). Single source of truth.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      # Go module + build cache (mise-action caches tool installs, not modules).
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build
        run: make build

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise installs Go (1.26.4, from .mise.toml) AND the CLI toolchain the
      # `make` targets call (golangci-lint, hadolint, trivy, gitleaks,
      # actionlint, shellcheck, govulncheck). Single source of truth.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      # Go module + build cache (mise-action caches tool installs, not modules).
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Test
        run: make test

  integration-test:
    # Skipped when running under act (local CI simulator). Testcontainers
    # spawns sibling docker containers from within the job runner, which
    # requires host-docker-socket + docker-in-docker semantics that act
    # emulates poorly. Ran by real GitHub Actions runners where it works.
    if: ${{ vars.ACT != 'true' && !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    needs: [changes, static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise installs Go (1.26.4, from .mise.toml) AND the CLI toolchain the
      # `make` targets call (golangci-lint, hadolint, trivy, gitleaks,
      # actionlint, shellcheck, govulncheck). Single source of truth.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      # Go module + build cache (mise-action caches tool installs, not modules).
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      # No Dapr sidecar is bootstrapped here. Onboarding's Dapr workflow
      # lifecycle is exercised end-to-end by the e2e job (which brings up a
      # full sidecar via compose) — duplicating it here added no coverage
      # and introduced a 10-min silent-hang failure mode when CI scheduler/
      # placement coordination slipped. See commit log for history.

      - name: Integration test
        run: make integration-test

  e2e:
    # Same rationale as integration-test — needs full docker-in-docker for
    # compose up, which act cannot provide without privileged socket mounts.
    if: ${{ vars.ACT != 'true' && !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    needs: [changes, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq

      - name: End-to-end test
        run: make e2e

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.e2e.yml logs --tail=200 || true

  docker:
    # Job-level gate: only runs on tag pushes. Previously the job always ran
    # but the single `Build image` step was step-gated, wasting ~15s of runner
    # setup on every non-tag push. Keeping the job in `needs:` of ci-pass is
    # fine — ci-pass treats `skipped` as pass.
    if: ${{ !failure() && !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    needs: [changes, static-check, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise installs Go (1.26.4) — `make image-build` compiles the Go service
      # binaries before building images.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build image
        run: make image-build

  ci-pass:
    # Mirror the gating of integration-test/e2e so ci-pass can still succeed
    # under act (where those two jobs are intentionally skipped).
    if: ${{ always() }}
    needs: [changes, static-check, build, test, integration-test, e2e, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all upstream jobs passed
        run: |
          # Treat 'skipped' as pass (integration-test + e2e are skipped under act).
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more upstream jobs failed or were cancelled"
            exit 1
          fi
          echo "All upstream jobs passed (or were intentionally skipped)."
