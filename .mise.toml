# Project-local mise config — the single source of truth for the toolchain.
# All contributors and CI (via jdx/mise-action) converge on these versions.
# Without this file, mise falls back to the user-global config, which drifts.
[tools]
go = "1.26.4"
"aqua:nektos/act" = "0.2.87"
"aqua:dapr/cli" = "1.17.1"
"aqua:hadolint/hadolint" = "2.14.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.1.4"
"aqua:golangci/golangci-lint" = "2.11.4"
"aqua:aquasecurity/trivy" = "0.69.3"
"aqua:gitleaks/gitleaks" = "8.30.1"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:kubernetes-sigs/kind" = "0.31.0"
