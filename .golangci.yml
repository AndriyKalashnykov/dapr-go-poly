version: "2"

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/AndriyKalashnykov/dapr-go-poly

linters:
  default: standard
  enable:
    - bodyclose     # detect unclosed HTTP response bodies
    - errorlint     # enforce errors.Is/As over == comparison
    - gocritic      # comprehensive style/performance/diagnostic checks
    - gosec         # SAST security scanner
    - misspell      # catch misspellings in comments and strings
    - noctx         # detect HTTP requests without context
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        # basket-service retains commented-out route code as a WIP placeholder
        # until its routes are activated. Flagging it on every lint run is noise.
        - commentedOutCode
    gosec:
      excludes:
        - G104  # unhandled errors — already covered by errcheck

issues:
  exclude-dirs:
    - vendor
