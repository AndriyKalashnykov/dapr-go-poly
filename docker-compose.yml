# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# Every operator-tunable value is `${VAR:-default}`-formed and documented in
# `.env.example`. Container-internal ports of THIRD-PARTY images (postgres
# 5432, rabbitmq 5672/15672) stay literal on the container side — those are
# fixed by the image and only the host-side mapping is tunable. Our own
# services (placement/scheduler/daprd/app) externalize both sides.

services:

  placement:
    # https://github.com/dapr/dapr/pkgs/container/daprd/versions?filters%5Bversion_type%5D=tagged
    # daprio uses http by default, whyle ghcr.io uses https, can be helpful in environments with "man in the middle" Netscope etc.
    image: "daprio/dapr:1.17.4@sha256:8e4da92d1e15a7aca7ecf416947d14d5a5db83ae502283219724d9608ff0e7d1"
    command:
      - "./placement"
      - "--port"
      - "${DAPR_PLACEMENT_PORT:-50006}"
    ports:
      - "${DAPR_PLACEMENT_HOST_PORT:-50006}:${DAPR_PLACEMENT_PORT:-50006}"

  scheduler:
    # Container uses image-default user to avoid bind/volume perms coupling.
    image: "daprio/dapr:1.17.4@sha256:8e4da92d1e15a7aca7ecf416947d14d5a5db83ae502283219724d9608ff0e7d1"
    # Flag changes in Dapr 1.17.3:
    #   --replica-count       → removed (standalone is default)
    #   --etcd-client-ports   → --etcd-client-port (single uint, no per-instance mapping)
    #   --etcd-client-http-ports → removed
    #   --initial-cluster     → --etcd-initial-cluster
    command:
      - "./scheduler"
      - "--port"
      - "${DAPR_SCHEDULER_PORT:-50007}"
      - "--id"
      - "scheduler-0"
      - "--etcd-data-dir"
      - "/var/run/dapr/scheduler"
      - "--etcd-initial-cluster"
      - "scheduler-0=http://scheduler-0:2380"
    ports:
      - "${DAPR_SCHEDULER_HOST_PORT:-50007}:${DAPR_SCHEDULER_PORT:-50007}"
    # The dapr image runs as nonroot (UID 65532) so host bind mounts and
    # default named volumes (both root-owned) can't be written to. A tmpfs
    # keeps scheduler state ephemeral — acceptable for local dev since Dapr
    # workflow/job state is recreated on each bring-up. To persist across
    # restarts, wire a named volume with explicit UID ownership.
    tmpfs:
      - /var/run/dapr/scheduler
    depends_on:
      placement:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      POSTGRES_DB: "${POSTGRES_DB:-product}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 2s
      timeout: 5s
      retries: 15

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "${PRODUCT_HOST_PORT:-1000}:${APP_INTERNAL_PORT:-8080}"
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DATABASE: "${PRODUCT_DATABASE:-product}"
      POSTGRES_USERNAME: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      ASPNETCORE_URLS: "http://+:${APP_INTERNAL_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      placement:
        condition: service_started
      scheduler:
        condition: service_started

  product-service-dapr:
    image: "daprio/daprd:1.17.4"
    command:
      - "./daprd"
      - "-app-id"
      - "product-service"
      - "-app-port"
      - "${APP_INTERNAL_PORT:-8080}"
      - "-placement-host-address"
      - "placement:${DAPR_PLACEMENT_PORT:-50006}"
      - "-scheduler-host-address"
      - "scheduler:${DAPR_SCHEDULER_PORT:-50007}"
      - "-log-level"
      - "info"
    # Note: -resources-path intentionally omitted. The components under
    # .iac/dapr/local/components/ point at a K8s in-cluster Redis which won't
    # resolve here. Local compose supports service invocation without loading
    # pubsub/state components. Add Redis and re-enable the resources path when
    # you want to exercise those building blocks locally.
    depends_on:
      product-service:
        condition: service_started
    network_mode: "service:product-service"

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "${ORDER_HOST_PORT:-1001}:${APP_INTERNAL_PORT:-8080}"
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DATABASE: "${ORDER_DATABASE:-order}"
      POSTGRES_USERNAME: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-test}"
      PRODUCT_SERVICE_BASE_URL: "${PRODUCT_SERVICE_BASE_URL:-http://product-service:8080}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      ASPNETCORE_URLS: "http://+:${APP_INTERNAL_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      product-service:
        condition: service_started

  order-service-dapr:
    image: "daprio/daprd:1.17.4"
    command:
      - "./daprd"
      - "-app-id"
      - "order-service"
      - "-app-port"
      - "${APP_INTERNAL_PORT:-8080}"
      - "-placement-host-address"
      - "placement:${DAPR_PLACEMENT_PORT:-50006}"
      - "-scheduler-host-address"
      - "scheduler:${DAPR_SCHEDULER_PORT:-50007}"
      - "-log-level"
      - "info"
    # Note: -resources-path intentionally omitted. The components under
    # .iac/dapr/local/components/ point at a K8s in-cluster Redis which won't
    # resolve here. Local compose supports service invocation without loading
    # pubsub/state components. Add Redis and re-enable the resources path when
    # you want to exercise those building blocks locally.
    depends_on:
      order-service:
        condition: service_started
    network_mode: "service:order-service"

volumes:
  postgres_data:
